events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name project-kaleidoscope.tech www.project-kaleidoscope.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name project-kaleidoscope.tech www.project-kaleidoscope.tech;

        ssl_certificate /etc/letsencrypt/live/project-kaleidoscope.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/project-kaleidoscope.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Health
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Root -> Swagger UI redirect
        location = / {
            return 301 https://$host/swagger-ui.html;
        }

        # SSE stream (exact match for priority) - WITHOUT /kaleidoscope prefix for frontend
        location = /api/notifications/stream {
            proxy_pass http://app:8080/kaleidoscope/api/notifications/stream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Swagger UI - with /kaleidoscope prefix
        location = /swagger-ui.html {
            proxy_pass http://app:8080/kaleidoscope/swagger-ui.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /swagger-ui/ {
            proxy_pass http://app:8080/kaleidoscope/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # OpenAPI spec - with /kaleidoscope prefix
        location /v3/api-docs {
            proxy_pass http://app:8080/kaleidoscope/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true;
        }

        location /kaleidoscope/swagger-ui/ {
            proxy_pass http://app:8080/kaleidoscope/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /kaleidoscope/v3/api-docs {
            proxy_pass http://app:8080/kaleidoscope/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true;
        }

        # Stress-test / legacy aliases → canonical Spring routes (must be before generic /api/)
        # Backend: GET /api/posts/suggestions (personalized feed; replaces old /api/recommendations name)
        location = /api/recommendations {
            proxy_pass http://app:8080/kaleidoscope/api/posts/suggestions;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # Map media search to post filter/search (GET /api/posts?q=…&page=…&size=…)
        location /api/search/media {
            rewrite ^/api/search/media$ /kaleidoscope/api/posts break;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # Main API location block - WITHOUT /kaleidoscope prefix for frontend compatibility
        #
        # Do NOT use `if ($request_method = OPTIONS) { ... return 204; }` here: nginx's `if` is
        # not part of the normal location flow and breaks `proxy_pass` for POST/PUT/etc.
        # (symptom: HTTP 501 "Unsupported method ('POST')" from a broken upstream path).
        # OPTIONS is permitted in Spring Security and handled by CorsConfigurationSource.
        location /api/ {
            proxy_pass http://app:8080/kaleidoscope/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # Fallback
        location / {
            return 404;
        }
    }
}
