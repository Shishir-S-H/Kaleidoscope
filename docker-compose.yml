  # RabbitMQ removed - using Redis Streams instead

  # ---------------------------------------------------------------------------
  # Phase 2-4 event-driven workers
  # ---------------------------------------------------------------------------

  media_preprocessor:
    image: ${DOCKER_USERNAME:-shishir01}/kaleidoscope-media_preprocessor:latest
    pull_policy: always
    volumes:
      - ./local_media_cache:/tmp/kaleidoscope_media
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379
      - SHARED_MEDIA_DIR=/tmp/kaleidoscope_media
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  federated_aggregator:
    image: ${DOCKER_USERNAME:-shishir01}/kaleidoscope-federated_aggregator:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --protected-mode yes
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:?REDIS_PASSWORD required}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  elasticsearch:
    image: elasticsearch:8.10.2
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:?ELASTICSEARCH_PASSWORD required}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:${ELASTICSEARCH_PASSWORD:?ELASTICSEARCH_PASSWORD required} http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

