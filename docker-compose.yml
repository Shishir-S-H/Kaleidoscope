# Docker Compose file for Kaleidoscope AI Microservices
# Note: version field is obsolete in modern Docker Compose
#
# AI workers use pre-built images from Docker Hub (same tags as production).
# Set DOCKER_USERNAME in .env to match the account that pushes images (CI default: shishir01).
# After changing code: push to main (or run workflow_dispatch) so CI builds and pushes, then:
#   docker compose pull <service> && docker compose up -d <service>

services:
  content_moderation:
    image: ${DOCKER_USERNAME:-shishir01}/kaleidoscope-content_moderation:latest
    pull_policy: always
    volumes:
      - ./local_media_cache:/tmp/kaleidoscope_media
    restart: always
    env_file:
      - ./shared/env_templates/content_moderation.env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379
      - AI_PLATFORM=${AI_PLATFORM:-huggingface}
      - SHARED_MEDIA_DIR=/tmp/kaleidoscope_media
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  image_tagger:
    image: ${DOCKER_USERNAME:-shishir01}/kaleidoscope-image_tagger:latest
    pull_policy: always
    volumes:
      - ./local_media_cache:/tmp/kaleidoscope_media
