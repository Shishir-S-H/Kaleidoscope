    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379
      - AI_PLATFORM=${AI_PLATFORM:-huggingface}
      - SHARED_MEDIA_DIR=/tmp/kaleidoscope_media
    depends_on:
