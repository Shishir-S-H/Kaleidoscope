name: Build & Push AI Images

# Builds every AI worker image and pushes to Docker Hub. Does NOT SSH into production.
# After this workflow succeeds, deploy manually on the droplet (see documentation/handoff_teammate_java_kaleidoscope_repo.md).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: kaleidoscope-ai-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - content_moderation
          - image_tagger
          - scene_recognition
          - image_captioning
          - face_recognition
          - post_aggregator
          - es_sync
          - media_preprocessor
          - profile_enrollment
          - face_matcher
          - image_embedding
          - dlq_processor
          - federated_aggregator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Dockerfile exists
        run: |
          if [ ! -f "./services/${{ matrix.service }}/Dockerfile" ]; then
            echo "ERROR: ./services/${{ matrix.service }}/Dockerfile not found"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kaleidoscope-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/kaleidoscope-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Confirm push
        run: |
          echo "Pushed: ${{ secrets.DOCKER_USERNAME }}/kaleidoscope-${{ matrix.service }}:latest"
          echo "SHA tag: ${{ secrets.DOCKER_USERNAME }}/kaleidoscope-${{ matrix.service }}:${{ github.sha }}"

  post-build:
    name: Manual deploy reminder
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: Print next steps for production
        run: |
          echo "============================================"
          echo "  All AI images built and pushed"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "============================================"
          echo ""
          echo "CI no longer deploys over SSH. On the droplet, run:"
          echo "  1) cd ~/Kaleidoscope && git pull origin main   # or your deploy branch"
          echo "  2) cd kaleidoscope-ai && git pull origin main  # if kaleidoscope-ai is a submodule/path"
          echo "  3) Apply DB migrations if needed (V4 face vectors):"
          echo "       psql ... -f migrations/V4__face_embeddings_vector_1408.sql"
          echo "  4) Recreate ES indices (face_search, known_faces_index, recommendations_knn)"
          echo "       or run: ./scripts/deployment/deploy-production.sh --skip-migration"
          echo "       after migrations, to refresh indices + docker compose pull + up"
          echo "  5) docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"
          echo ""
          echo "See: documentation/handoff_teammate_java_kaleidoscope_repo.md"
